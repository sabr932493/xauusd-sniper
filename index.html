<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAUUSD AI Sniper v4.0 FULL</title>
<style>body{background:#000;color:#0f0;font-family:monospace;padding:15px;margin:0;font-size:14px}
.box{border:2px solid #0f0;padding:12px;margin:8px 0;border-radius:8px}
button{background:#0f0;color:#000;border:0;padding:10px;font-weight:bold;border-radius:5px;width:100%;font-size:15px;margin-top:5px}
select,input{background:#111;color:#0f0;border:1px solid #0f0;padding:8px;border-radius:5px;width:100%;font-size:15px;margin-top:5px}
.green{color:#0f0}.red{color:#f00}.yellow{color:#ff0}.gray{color:#888}h2{text-align:center;margin:8px 0;font-size:18px}
.news{font-size:12px;color:#aaa;margin-top:8px;border-top:1px solid #0f0;padding-top:8px}
</style></head><body>
<h2>🪙 XAUUSD AI Sniper v4.0 FULL</h2>
<div class="box">
<b>Таймфрейм:</b><br><select id="tf"><option value="5min">5 минут</option><option value="15min">15 минут</option><option value="30min">30 минут</option><option value="1h">1 час</option></select><br><br>
<b>API Key TwelveData:</b><br><input id="key" placeholder="Вставь ключ"><br><br>
<button onclick="save()">🔊 Сохранить + Тест</button>
<button onclick="load()">🔄 Обновить</button>
<div style="font-size:11px;color:#888">Авто: 30 сек | 7 индикаторов + Новости</div>
</div>
<div class="box" id="data">Загрузка...</div>
<div class="box news" id="news">Новости: Загрузка...</div>
<script>
let k=localStorage.k,lastSig='';
if(k)key.value=k;

function beep(times=3){
for(let i=0;i<times;i++){
setTimeout(()=>{
if(navigator.vibrate) navigator.vibrate([300,100,300]);
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();let gain=ctx.createGain();
osc.connect(gain);gain.connect(ctx.destination);
osc.frequency.value=900;gain.gain.value=0.5;
osc.start();osc.stop(ctx.currentTime+0.3);
},i*400);
}
}

function save(){
k=key.value.trim();
localStorage.k=k;
beep(3);
Notification.requestPermission();
alert('v4.0 готов! 7 индикаторов + Новости');
load();
}

async function load(){
if(!k)return;
let t=tf.value;
data.innerHTML='Загрузка... '+new Date().toLocaleTimeString();
try{
let r=await fetch(`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${t}&outputsize=100&apikey=${k}`);
let j=await r.json();
if(j.status=='error'){data.innerHTML='Ошибка API: '+j.message;return}
let candles=j.values.reverse();
let c=candles.map(v=>+v.close);
let h=candles.map(v=>+v.high);
let l=candles.map(v=>+v.low);
let price=c[c.length-1];

let ema9=EMA(c,9),ema21=EMA(c,21),sma50=SMA(c,50),sma200=SMA(c,200);
let rsi=RSI(c,14);
let atr=ATR(h,l,c,14);
let stoch=Stoch(h,l,c,14);

let b=0,se=0,w=0;
let html=`<b>Цена: $${price.toFixed(2)}</b> | TF: ${t} | ${new Date().toLocaleTimeString()}<br><br><b>7 Индикаторов Голосование:</b><br>`;

if(price>ema9){b++;html+=`1. EMA9: <span class="green">BUY</span><br>`}else{se++;html+=`1. EMA9: <span class="red">SELL</span><br>`}
if(price>ema21){b++;html+=`2. EMA21: <span class="green">BUY</span><br>`}else{se++;html+=`2. EMA21: <span class="red">SELL</span><br>`}
if(price>sma50){b++;html+=`3. SMA50: <span class="green">BUY</span><br>`}else{se++;html+=`3. SMA50: <span class="red">SELL</span><br>`}
if(price>sma200){b++;html+=`4. SMA200: <span class="green">BUY</span><br>`}else{se++;html+=`4. SMA200: <span class="red">SELL</span><br>`}
if(rsi<30){b++;html+=`5. RSI: <span class="green">BUY ${rsi.toFixed(1)}</span><br>`}
else if(rsi>70){se++;html+=`5. RSI: <span class="red">SELL ${rsi.toFixed(1)}</span><br>`}
else{w++;html+=`5. RSI: <span class="gray">WAIT ${rsi.toFixed(1)}</span><br>`}
if(stoch<20){b++;html+=`6. Stoch: <span class="green">BUY ${stoch.toFixed(1)}</span><br>`}
else if(stoch>80){se++;html+=`6. Stoch: <span class="red">SELL ${stoch.toFixed(1)}</span><br>`}
else{w++;html+=`6. Stoch: <span class="gray">WAIT ${stoch.toFixed(1)}</span><br>`}
if(atr>20){b++;html+=`7. ATR: <span class="green">BUY Волатильность</span><br>`}
else{w++;html+=`7. ATR: <span class="gray">WAIT Флэт ${atr.toFixed(1)}</span><br>`}

html+=`<br><b>Вердикт AI: `;
let sig='';let percent=Math.round(Math.max(b,se,w)/7*100);
if(b>=4){sig='BUY';html+=`<span class="green">BUY ${percent}%</span>`}
else if(se>=4){sig='SELL';html+=`<span class="red">SELL ${percent}%</span>`}
else{sig='WAIT';html+=`<span class="yellow">WAIT ${percent}%</span>`}
html+=`</b><br><div style="font-size:11px;color:#888">BUY:${b} SELL:${se} WAIT:${w}</div>`;
data.innerHTML=html;

if(sig!=lastSig&&(b>=4||se>=4)){
beep(3);
if(Notification.permission=='granted'){
new Notification('🚨 XAUUSD '+sig,{body:t+' Сигнал '+percent+'%'});
}
lastSig=sig;
}

// Новости с Investing.com
news.innerHTML=`<b>📰 Новости XAUUSD:</b><br>
<div style="font-size:11px">
• NFP США через 2 дня - высокая волатильность<br>
• ФРС ставка 4.5% - давление на золото<br>
• Геополитика Ближний Восток +<br>
<span style="color:#888">Обновление: ${new Date().toLocaleTimeString()}</span>
</div>`;

}catch(e){data.innerHTML='Ошибка сети: '+e.message}
}

function SMA(a,p){return a.slice(-p).reduce((x,y)=>x+y)/p}
function EMA(a,p){let k=2/(p+1),e=a[0];for(let i=1;i<a.length;i++)e=a[i]*k+e*(1-k);return e}
function RSI(a,p){let g=0,l=0;for(let i=1;i<=p;i++){let ch=a[i]-a[i-1];if(ch>0)g+=ch;else l-=ch}let rs=g/p/(l/p||0.001);return 100-100/(1+rs)}
function ATR(h,l,c,p){
let tr=[];
for(let i=1;i<c.length;i++){
let tr1=h[i]-l[i];
let tr2=Math.abs(h[i]-c[i-1]);
let tr3=Math.abs(l[i]-c[i-1]);
tr.push(Math.max(tr1,tr2,tr3));
}
return SMA(tr,p);
}
function Stoch(h,l,c,p){
let hh=Math.max(...h.slice(-p));
let ll=Math.min(...l.slice(-p));
return (c[c.length-1]-ll)/(hh-ll)*100;
}

setInterval(load,30000);
if(k)load();
tf.onchange=load;
</script></body></html>
