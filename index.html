<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAUUSD Sniper</title>
<style>body{background:#000;color:#0f0;font-family:monospace;padding:20px}
.box{border:2px solid #0f0;padding:15px;margin:10px 0}button{background:#0f0;color:#000;border:0;padding:10px}</style>
</head><body>
<h2>🪙 XAUUSD AI Sniper v2</h2>
<div class="box">
<select id="tf"><option value="5min">5 минут</option><option value="15min">15 минут</option><option value="30min">30 минут</option><option value="1h">1 час</option></select><br><br>
<input id="key" placeholder="TwelveData API Key" style="width:100%;padding:8px;background:#111;color:#0f0"><br><br>
<button onclick="save()">Сохранить + Звук ВКЛ</button></div>
<div class="box" id="data">Вставь API ключ...</div>
<audio id="s" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<script>
let k=localStorage.k;if(k)key.value=k;
function save(){k=key.value;localStorage.k=k;s.play();alert('Звук ОК');load()}
async function load(){if(!k)return;let t=tf.value;let r=await fetch(`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${t}&outputsize=50&apikey=${k}`);
let d=await r.json();if(d.values){data.innerHTML='Цена: $'+d.values[0].close+'<br>TF: '+t+'<br>Ключ работает!'}else data.innerHTML='Ошибка: '+d.message}
setInterval(load,60000);if(k)load();tf.onchange=load;
</script></body></html>
