<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAUUSD AI v4.8 MATRIX</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:15px;margin:0;font-size:14px}
.box{border:2px solid #0f0;padding:12px;margin:10px 0;border-radius:8px;background:#000}
.price-box{border:3px solid #0f0;background:#001100;text-align:center}
.price{font-size:42px;font-weight:bold;margin:5px 0;color:#0f0}
.dir{font-size:18px;margin-top:5px;color:#0f0}
button{background:#0f0;color:#000;border:0;padding:12px;width:100%;font-weight:bold;border-radius:5px;margin-top:8px;font-size:16px}
button:hover{background:#0a0}
.input-wrap{position:relative}
input,select{background:#000;color:#0f0;border:2px solid #0f0;padding:8px 40px 8px 8px;width:100%;border-radius:5px;margin-top:5px;font-size:16px}
input:focus,select:focus{outline:none;border-color:#0f0;box-shadow:0 0 5px #0f0}
.eye{position:absolute;right:10px;top:32px;cursor:pointer;font-size:20px;user-select:none}
.small{font-size:11px;color:#0f0;text-align:center;margin-top:5px;opacity:0.8}
.verdict{font-size:32px;text-align:center;font-weight:bold;color:#0f0}
.percent{font-size:20px;text-align:center;color:#0f0;margin-top:5px}
.timer{font-size:16px;color:#0f0;font-weight:bold;text-align:center}
h2{text-align:center;color:#0f0;margin:8px 0;text-shadow:0 0 10px #0f0}
</style></head><body>
<h2>🪙 XAUUSD AI v4.8 MATRIX</h2>

<div class="box price-box">
<div class="small">РЫНОЧНАЯ ЦЕНА XAUUSD</div>
<div class="price" id="price">---.--</div>
<div class="dir" id="direction">Идет ВВЕРХ ▲</div>
<div class="small" id="spread">Спред: ~0.30-0.50 $</div>
</div>

<div class="box">
<div class="verdict" id="verdict">Загрузка AI...</div>
<div class="percent" id="percent"></div>
</div>

<div class="box">
<b style="color:#0f0">Настройки</b><br>
Таймфрейм: <select id="tf"><option>5min</option><option>15min</option><option>30min</option><option>1h</option></select><br>

API Key:
<div class="input-wrap">
<input id="key" type="password" placeholder="Твой ключ TWELVE DATA">
<span class="eye" onclick="toggleKey()">👁️</span>
</div><br>

<button onclick="save()">Сохранить & Тест звука</button>
<button onclick="scan()">Сканировать сейчас</button>
<div class="timer" id="timer">Автообновление: 60 сек</div>
</div>

<div class="box" id="details">Загрузка данных...</div>

<script>
let lastDir='', lastPrice=0, countdown=60, timerInterval;
let key=localStorage.getItem('td_key')||'';
document.getElementById('key').value=key;
const DIV=10.55;

function toggleKey(){
let k=document.getElementById('key');
let eye=document.querySelector('.eye');
if(k.type==='password'){
k.type='text';
eye.innerText='🙈';
}else{
k.type='password';
eye.innerText='👁️';
}
}

function save(){
key=document.getElementById('key').value.trim();
localStorage.setItem('td_key',key);
beep();
alert('✅ Ключ сохранен! MATRIX режим активен');
scan();
startTimer();
}

function startTimer(){
countdown=60;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
countdown--;
document.getElementById('timer').innerHTML=`Автообновление: <span style="color:#0f0">${countdown}</span> сек`;
if(countdown<=0){
countdown=60;
scan();
}
},1000);
}

async function scan(){
document.getElementById('details').innerHTML='Сканирую рынок... '+new Date().toLocaleTimeString();
if(!key){alert('Вставь API ключ!');return;}
let tf=document.getElementById('tf').value;

try{
let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${tf}&outputsize=50&apikey=${key}`;
let r=await fetch(url);let d=await r.json();
if(d.status==='error'){document.getElementById('details').innerHTML='Ошибка: '+d.message;return;}
let c=d.values.map(x=>parseFloat(x.close)/DIV);
let price=c[0];
let ema9=EMA(c,9), ema21=EMA(c,21), rsi=RSI(c,14);

document.getElementById('price').innerText=price.toFixed(2);
if(price>lastPrice){
document.getElementById('direction').innerHTML='▲ Идет ВВЕРХ';
}else if(price<lastPrice){
document.getElementById('direction').innerHTML='▼ Идет ВНИЗ';
}else{
document.getElementById('direction').innerHTML='■ Флэт';
}
lastPrice=price;

let score=0;
if(price>ema9)score++;else score--;
if(price>ema21)score++;else score--;
if(rsi<30)score++;if(rsi>70)score--;
let pct=Math.abs(score)/3*100;

let verdict=document.getElementById('verdict');
let percent=document.getElementById('percent');

if(score>=2){
verdict.innerHTML='ВВЕРХ';
percent.innerHTML=`Сила: ${pct.toFixed(0)}%`;
if(lastDir!=='up'){beep();lastDir='up';}
}else if(score<=-2){
verdict.innerHTML='ВНИЗ';
percent.innerHTML=`Сила: ${pct.toFixed(0)}%`;
if(lastDir!=='down'){beep();lastDir='down';}
}else{
verdict.innerHTML='ФЛЭТ';
percent.innerHTML=`Сила: ${pct.toFixed(0)}%`;
lastDir='wait';
}

document.getElementById('details').innerHTML=`<b>Данные индикаторов:</b><br>
Цена: $${price.toFixed(2)}<br>
EMA9: $${ema9.toFixed(2)} ${price>ema9?'▲':'▼'}<br>
EMA21: $${ema21.toFixed(2)} ${price>ema21?'▲':'▼'}<br>
RSI14: ${rsi.toFixed(1)}<br><br>
Score: ${score}/3`;

}catch(e){document.getElementById('details').innerHTML='Ошибка сети: '+e}
}

function EMA(arr,p){let k=2/(p+1),ema=arr[0];for(let i=1;i<arr.length;i++)ema=arr[i]*k+ema*(1-k);return ema}
function RSI(arr,p){let g=0,l=0;for(let i=1;i<=p;i++){let ch=arr[i]-arr[i-1];if(ch>0)g+=ch;else l-=ch}let rs=g/p/(l/p||0.001);return 100-100/(1+rs)}
function beep(){try{let a=new AudioContext();let o=a.createOscillator();o.frequency.value=800;o.connect(a.destination);o.start();o.stop(a.currentTime+0.2);}catch(e){}}

if(key){
scan();
startTimer();
}
document.getElementById('tf').onchange=()=>{
scan();
startTimer();
};
</script></body></html>
