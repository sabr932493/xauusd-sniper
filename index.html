<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAUUSD AI v4.6</title>
<style>body{background:#000;color:#0f0;font-family:monospace;padding:15px;margin:0}
.box{border:2px solid #0f0;padding:12px;margin:10px 0;border-radius:8px}
.price-box{border:3px solid #0f0;background:#001100;text-align:center}
.price{font-size:42px;font-weight:bold;margin:5px 0}
.price.up{color:#0f0}.price.down{color:#f00}
.dir{font-size:18px;margin-top:5px}
button{background:#0f0;color:#000;border:0;padding:12px;width:100%;font-weight:bold;border-radius:5px;margin-top:8px}
input,select{background:#111;color:#0f0;border:1px solid #0f0;padding:8px;width:100%;border-radius:5px;margin-top:5px}
.small{font-size:11px;color:#888;text-align:center;margin-top:5px}
.up{color:#0f0}.down{color:#f00}.wait{color:#888}
.timer{font-size:16px;color:#0f0;font-weight:bold}</style></head><body>
<h2 style="text-align:center">XAUUSD AI v4.6</h2>

<div class="box price-box" id="priceBox">
<div class="small">РЫНОЧНАЯ ЦЕНА XAUUSD</div>
<div class="price" id="price">---.--</div>
<div class="dir" id="direction">Загрузка...</div>
<div class="small" id="spread">Спред: ~0.30-0.50 $</div>
</div>

<div class="box" id="verdict">
<div style="font-size:20px;text-align:center">Загрузка AI...</div>
</div>

<div class="box">
<b>Настройки</b><br>
Таймфрейм: <select id="tf"><option>5min</option><option>15min</option><option>30min</option><option>1h</option></select><br>
API Key: <input id="key" placeholder="Твой ключ TWELVE DATA"><br>
<button onclick="save()">Сохранить & Тест звука</button>
<button onclick="scan()">Сканировать сейчас</button>
<div class="timer" id="timer">Автообновление: 30 сек</div>
</div>

<div class="box" id="details">Загрузка данных...</div>

<script>
let lastDir='', lastPrice=0, countdown=30, timerInterval;
let key=localStorage.getItem('td_key')||'';
document.getElementById('key').value=key;

function save(){
key=document.getElementById('key').value.trim();
localStorage.setItem('td_key',key);
let a=new AudioContext();let o=a.createOscillator();o.frequency.value=800;o.connect(a.destination);o.start();o.stop(a.currentTime+0.2);
alert('Ключ сохранен! Тест звука прошел');
scan();
}

function startTimer(){
countdown=30;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
countdown--;
document.getElementById('timer').innerHTML=`Автообновление: <span style="color:#0f0">${countdown}</span> сек`;
if(countdown<=0){
countdown=30;
scan();
}
},1000);
}

async function scan(){
document.getElementById('details').innerHTML='Сканирую рынок... '+new Date().toLocaleTimeString();
if(!key){alert('Вставь API ключ!');return;}
let tf=document.getElementById('tf').value;

try{
let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${tf}&outputsize=50&apikey=${key}`;
let r=await fetch(url);let d=await r.json();
if(d.status==='error'){document.getElementById('details').innerHTML='Ошибка: '+d.message;return;}
let c=d.values.map(x=>parseFloat(x.close));
let price=c[0];
let ema9=EMA(c,9), ema21=EMA(c,21), rsi=RSI(c,14);

// ЦЕНА
let priceEl=document.getElementById('price');
let dirEl=document.getElementById('direction');
priceEl.innerText=price.toFixed(2);

if(price>lastPrice){
priceEl.className='price up';
dirEl.innerHTML='▲ Идет ВВЕРХ';
dirEl.className='dir up';
}else if(price<lastPrice){
priceEl.className='price down';
dirEl.innerHTML='▼ Идет ВНИЗ';
dirEl.className='dir down';
}else{
dirEl.innerHTML='■ Флэт';
dirEl.className='dir wait';
}
lastPrice=price;

// СИГНАЛ AI
let score=0;
if(price>ema9)score++;else score--;
if(price>ema21)score++;else score--;
if(rsi<30)score++;if(rsi>70)score--;
let pct=Math.abs(score)/3*100;

let verdict=document.getElementById('verdict');
if(score>=2){
verdict.innerHTML=`<div style="font-size:32px;text-align:center" class="up">ВВЕРХ ${pct.toFixed(0)}%</div><div style="text-align:center" class="small">Можно покупать</div>`;
if(lastDir!=='up'){beep();lastDir='up';}
}else if(score<=-2){
verdict.innerHTML=`<div style="font-size:32px;text-align:center" class="down">ВНИЗ ${pct.toFixed(0)}%</div><div style="text-align:center" class="small">Можно продавать</div>`;
if(lastDir!=='down'){beep();lastDir='down';}
}else{
verdict.innerHTML=`<div style="font-size:24px;text-align:center" class="wait">ФЛЭТ ${pct.toFixed(0)}%</div><div style="text-align:center" class="small">Ждем сигнал</div>`;
lastDir='wait';
}

// ДЕТАЛИ
document.getElementById('details').innerHTML=`<b>Данные индикаторов:</b><br>Цена: $${price.toFixed(2)}<br>EMA9: $${ema9.toFixed(2)} ${price>ema9?'▲':'▼'}<br>EMA21: $${ema21.toFixed(2)} ${price>ema21?'▲':'▼'}<br>RSI14: ${rsi.toFixed(1)} ${rsi<30?'▲ перепродан':rsi>70?'▼ перекуплен':''}<br><br>Score: ${score}/3`;

}catch(e){document.getElementById('details').innerHTML='Ошибка сети: '+e}
}

function EMA(arr,p){let k=2/(p+1),ema=arr[0];for(let i=1;i<arr.length;i++)ema=arr[i]*k+ema*(1-k);return ema}
function RSI(arr,p){let g=0,l=0;for(let i=1;i<=p;i++){let ch=arr[i]-arr[i-1];if(ch>0)g+=ch;else l-=ch}let rs=g/p/(l/p||0.001);return 100-100/(1+rs)}
function beep(){let a=new AudioContext();let o=a.createOscillator();o.frequency.value=900;o.connect(a.destination);o.start();o.stop(a.currentTime+0.3)}

if(key){
scan();
startTimer();
}
document.getElementById('tf').onchange=()=>{
scan();
startTimer();
};
</script></body></html>
