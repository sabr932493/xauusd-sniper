<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAUUSD AI</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;margin:0;text-align:center}
.box{border:2px solid #0f0;padding:20px;margin:20px 0;border-radius:10px}
.price{font-size:48px;font-weight:bold;margin:10px 0}
.signal{font-size:36px;font-weight:bold;margin:15px 0}
input{padding:10px;width:250px;background:#111;color:#0f0;border:2px solid #0f0;border-radius:5px;font-size:16px}
button{padding:12px 30px;background:#0f0;color:#000;border:0;border-radius:5px;font-weight:bold;font-size:16px;margin:10px;cursor:pointer}
button:hover{opacity:0.8}
.error{color:#f00;margin-top:10px}
</style></head><body>

<h1>🪙 XAUUSD AI v1.0</h1>

<div class="box">
<div class="price" id="price">---.--</div>
<div class="signal" id="signal">Жду API ключ...</div>
<div class="error" id="error"></div>
</div>

<div class="box">
API Key TwelveData: <input id="key" type="text" placeholder="Вставь ключ сюда"><br>
<button onclick="getPrice()">ПОЛУЧИТЬ ЦЕНУ</button>
</div>

<script>
async function getPrice(){
let key=document.getElementById('key').value.trim();
let err=document.getElementById('error');
err.innerHTML='';

if(!key){
err.innerHTML='❌ Вставь API ключ TwelveData!';
return;
}

document.getElementById('signal').innerHTML='Загрузка...';

try{
let url=`https://api.twelvedata.com/price?symbol=XAU/USD&apikey=${key}`;
let r=await fetch(url);
let d=await r.json();

if(d.price){
let price=parseFloat(d.price).toFixed(2);
document.getElementById('price').innerText=price+' $';

if(price>3950){
document.getElementById('signal').innerHTML='🟢 BUY';
document.getElementById('signal').style.color='#0f0';
}else{
document.getElementById('signal').innerHTML='🔴 SELL';
document.getElementById('signal').style.color='#f00';
}
err.innerHTML='✅ Работает! Обновляй страницу для новой цены';
}else{
err.innerHTML='❌ Ошибка: '+d.message+'<br>Проверь API ключ на twelvedata.com';
document.getElementById('signal').innerHTML='ОШИБКА';
}
}catch(e){
err.innerHTML='❌ Нет интернета или неверный ключ';
document.getElementById('signal').innerHTML='ОШИБКА';
}
</script></body></html>
