<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAUUSD AUTO</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;margin:0;text-align:center}
.box{border:3px solid #0f0;padding:30px;margin:20px 0;border-radius:15px}
.signal{font-size:80px;font-weight:bold;margin:20px 0;min-height:100px}
.info{font-size:18px;margin:10px 0}
.price{font-size:32px;font-weight:bold;color:#0f0;margin:15px 0}
.error{color:#f00;margin-top:15px;font-size:14px}
.small{color:#888;font-size:12px;margin-top:10px}
</style></head><body>

<h1>⚡ XAUUSD AUTO</h1>

<div class="box">
<div class="signal" id="signal">СКАНИРУЮ...</div>
<div class="info" id="info"></div>
<div class="price" id="price"></div>
<div class="error" id="error"></div>
</div>

<div class="small">Автоскан: 5 сек | Ключ встроен</div>

<script>
// АВТО КЛЮЧ - НЕ СВЕТИТЬ НИКОМУ!
const API_KEY = '283e7db1eb4b4028903dbd18771ab97a';
let countdown=5;

async function scan(){
document.getElementById('signal').innerHTML='СКАНИРУЮ...';
document.getElementById('signal').style.color='#ff0';

try{
let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=5min&outputsize=5&apikey=${API_KEY}`;
let r=await fetch(url);
let d=await r.json();

if(d.status=='error'){
document.getElementById('error').innerHTML='❌ API ОШИБКА: '+d.message;
document.getElementById('signal').innerHTML='ОШИБКА';
return;
}

if(d.values && d.values.length>=2){
let c=d.values.map(x=>parseFloat(x.close));
let price=c[0];
let prev=c[1];
let momentum=price-prev;

document.getElementById('price').innerHTML=price.toFixed(2)+'$';

let signal=document.getElementById('signal');
let info=document.getElementById('info');

if(momentum>0.1){
signal.innerHTML='🟢 BUY';
signal.style.color='#0f0';
info.innerHTML=`+${momentum.toFixed(2)}$ за 5мин | Сила: ${(momentum*100).toFixed(0)}%`;
document.getElementById('error').innerHTML='✅ СИГНАЛ BUY';
}else if(momentum<-0.1){
signal.innerHTML='🔴 SELL';
signal.style.color='#f00';
info.innerHTML=`${momentum.toFixed(2)}$ за 5мин | Сила: ${(Math.abs(momentum)*100).toFixed(0)}%`;
document.getElementById('error').innerHTML='✅ СИГНАЛ SELL';
}else{
signal.innerHTML='■ FLAT';
signal.style.color='#888';
info.innerHTML=`${momentum.toFixed(2)}$ за 5мин | Флэт`;
document.getElementById('error').innerHTML='Жду движение 0.1$+';
}
}else{
document.getElementById('error').innerHTML='❌ Мало данных от API';
document.getElementById('signal').innerHTML='НЕТ ДАННЫХ';
}
}catch(e){
document.getElementById('error').innerHTML='❌ ОШИБКА СЕТИ: '+e.message;
document.getElementById('signal').innerHTML='ОШИБКА';
}
}

// Автоскан каждые 5 сек
setInterval(()=>{
countdown--;
if(countdown<=0){
countdown=5;
scan();
}
},1000);

// Запуск сразу
scan();
</script></body></html>
