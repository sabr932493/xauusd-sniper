<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ТЕСТ XAUUSD</title>
<style>body{background:#000;color:#0f0;font-family:monospace;padding:15px}</style></head><body>
<h2>ТЕСТ API</h2>
<div id="out">Жму тест...</div>
API: <input id="key" placeholder="Вставь ключ"><br><br>
<button onclick="test()">ПРОВЕРИТЬ API</button>

<script>
function test(){
let k=document.getElementById('key').value.trim();
document.getElementById('out').innerHTML='Запрос...';
fetch(`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=5min&outputsize=5&apikey=${k}&format=JSON`)
.then(r=>r.json())
.then(d=>{
if(d.status==='error') document.getElementById('out').innerHTML='❌ Ошибка: '+d.message;
else document.getElementById('out').innerHTML='✅ РАБОТАЕТ! Цена: '+d.values[0].close;
})
.catch(e=>document.getElementById('out').innerHTML='❌ Сеть: '+e.message);
}
</script></body></html>
