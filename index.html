<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAUUSD AI v4.9 ULTIMATE</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:12px;margin:0;font-size:13px}
.box{border:2px solid #0f0;padding:10px;margin:8px 0;border-radius:6px;background:#000}
.price-box{border:3px solid #0f0;background:#001100;text-align:center}
.price{font-size:38px;font-weight:bold;margin:3px 0;color:#0f0}
.dir{font-size:16px;color:#0f0}
button{background:#0f0;color:#000;border:0;padding:10px;width:100%;font-weight:bold;border-radius:5px;margin-top:6px;font-size:15px}
input,select{background:#000;color:#0f0;border:2px solid #0f0;padding:7px 35px 7px 7px;width:100%;border-radius:5px;margin-top:4px;font-size:15px}
.eye{position:absolute;right:8px;top:30px;cursor:pointer;font-size:18px}
.small{font-size:10px;color:#0f0;opacity:0.7}
.verdict{font-size:28px;text-align:center;font-weight:bold;color:#0f0}
.percent{font-size:16px;text-align:center;color:#0f0}
.timer{font-size:14px;color:#0f0;font-weight:bold;text-align:center}
h2{text-align:center;color:#0f0;margin:6px 0;text-shadow:0 0 8px #0f0;font-size:18px}
.levels{font-size:12px;line-height:1.6}
.alert{border:2px solid #0f0;background:#001100;padding:8px;margin:5px 0;text-align:center;font-weight:bold}
.history{max-height:120px;overflow-y:auto;font-size:11px}
.input-wrap{position:relative}
</style></head><body>
<h2>🪙 XAUUSD AI v4.9 ULTIMATE</h2>

<div class="box price-box">
<div class="small">РЫНОЧНАЯ ЦЕНА XAUUSD</div>
<div class="price" id="price">---.--</div>
<div class="dir" id="direction">Загрузка...</div>
<div class="small" id="spread">Спред: ~0.30-0.50 $</div>
</div>

<div class="box">
<div class="verdict" id="verdict">Загрузка AI...</div>
<div class="percent" id="percent"></div>
</div>

<div class="box">
<b>УРОВНИ S/R</b>
<div class="levels" id="levels">Загрузка...</div>
</div>

<div class="box" id="newsBox">
<b>НОВОСТИ</b>
<div class="small" id="news">Загрузка...</div>
</div>

<div class="box">
<b>TP/SL КАЛЬКУЛЯТОР</b>
<div class="small" id="tpsl">Ждём сигнал...</div>
</div>

<div class="box">
<b>ИСТОРИЯ СИГНАЛОВ <span id="winrate"></span></b>
<div class="history" id="history">История пуста...</div>
</div>

<div class="box">
<b>Настройки</b><br>
Таймфрейм: <select id="tf"><option>5min</option><option>15min</option><option>30min</option><option>1h</option></select><br>
API Key:
<div class="input-wrap">
<input id="key" type="password" placeholder="TWELVE DATA KEY">
<span class="eye" onclick="toggleKey()">👁️</span>
</div>
<button onclick="save()">Сохранить & Тест</button>
<button onclick="scan()">Сканировать</button>
<div class="timer" id="timer">Авто: 60 сек</div>
</div>

<script>
let lastDir='', lastPrice=0, countdown=60, timerInterval, lastImpulse=0;
let history=[];
let key=localStorage.getItem('td_key')||'';
document.getElementById('key').value=key;

function toggleKey(){
let k=document.getElementById('key');
let eye=document.querySelector('.eye');
k.type=k.type==='password'?'text':'password';
eye.innerText=k.type==='password'?'👁️':'🙈';
}

function save(){
key=document.getElementById('key').value.trim();
localStorage.setItem('td_key',key);
beep();
alert('✅ Ключ сохранен! ULTIMATE активен');
scan();
}

function startTimer(){
countdown=60;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
countdown--;
document.getElementById('timer').innerHTML=`Авто: <span>${countdown}</span> сек`;
if(countdown<=0){
countdown=60;
scan();
}
},1000);
}

async function scan(){
if(!key){alert('Вставь API ключ!');return;}
let tf=document.getElementById('tf').value;

try{
let url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${tf}&outputsize=100&apikey=${key}`;
let r=await fetch(url);let d=await r.json();
if(d.status==='error'){return;}
let vals=d.values.reverse();
let c=vals.map(x=>parseFloat(x.close));
let h=vals.map(x=>parseFloat(x.high));
let l=vals.map(x=>parseFloat(x.low));
let price=c[c.length-1];
let ema9=EMA(c,9), ema21=EMA(c,21), rsi=RSI(c,14);

// 1. ЦЕНА
document.getElementById('price').innerText=price.toFixed(2);
if(price>lastPrice){
document.getElementById('direction').innerHTML='▲ Идет ВВЕРХ';
}else if(price<lastPrice){
document.getElementById('direction').innerHTML='▼ Идет ВНИЗ';
}else{
document.getElementById('direction').innerHTML='■ Флэт';
}

// 2. АЛЕРТ ИМПУЛЬСА
if(Math.abs(price-lastPrice)>2 && lastPrice>0){
if(Date.now()-lastImpulse>10000){
document.getElementById('verdict').innerHTML='<div class="alert">🚨 ИМПУЛЬС! Движение 2$+ за минуту!</div>';
beep();beep();
lastImpulse=Date.now();
setTimeout(scan,2000);
}
lastPrice=price;

// 3. УРОВНИ S/R
let recentHigh=Math.max(...h.slice(-20));
let recentLow=Math.min(...l.slice(-20));
let pivot=(recentHigh+recentLow+price)/3;
let r1=2*pivot-recentLow;
let s1=2*pivot-recentHigh;
document.getElementById('levels').innerHTML=
`R1: ${r1.toFixed(2)} ${price<r1?'▼':'▲'}<br>
Pivot: ${pivot.toFixed(2)}<br>
S1: ${s1.toFixed(2)} ${price>s1?'▲':'▼'}`;

// 4. НОВОСТНОЙ ФИЛЬТР
let now=new Date();
let newsTime=new Date(now);
newsTime.setHours(15,30,0,0); // NFP пример 15:30 МСК
let diff=(newsTime-now)/1000/60;
if(diff>0 && diff<5){
document.getElementById('newsBox').innerHTML='<b style="color:#0f0">НОВОСТИ</b><div class="alert">⚠️ NFP через '+Math.floor(diff)+' мин - ТОРГОВЛЯ СТОП!</div>';
}else{
document.getElementById('news').innerHTML=`NFP: 15:30 МСК<br>FOMC: Завтра 22:00<br>Обновлено: ${now.toLocaleTimeString()}`;
}

// 5. СИГНАЛ AI
let score=0;
if(price>ema9)score++;else score--;
if(price>ema21)score++;else score--;
if(price>pivot)score++;else score--;
if(rsi<30)score++;if(rsi>70)score--;
let pct=Math.abs(score)/4*100;

let verdict=document.getElementById('verdict');
let percent=document.getElementById('percent');
let signal='';

if(score>=2){
signal='ВВЕРХ';
verdict.innerHTML='ВВЕРХ';
percent.innerHTML=`Сила: ${pct.toFixed(0)}%`;
calcTP(price,'up');
addHistory('ВВЕРХ',pct);
if(lastDir!=='up'){beep();lastDir='up';}
}else if(score<=-2){
signal='ВНИЗ';
verdict.innerHTML='ВНИЗ';
percent.innerHTML=`Сила: ${pct.toFixed(0)}%`;
calcTP(price,'down');
addHistory('ВНИЗ',pct);
if(lastDir!=='down'){beep();lastDir='down';}
}else{
verdict.innerHTML='ФЛЭТ';
percent.innerHTML=`Сила: ${pct.toFixed(0)}%`;
document.getElementById('tpsl').innerHTML='Ждём сигнал...';
lastDir='wait';
}

}catch(e){console.log(e)}
}

function calcTP(price,dir){
let sl=dir==='up'?price-5:price+5;
let tp1=dir==='up'?price+10:price-10;
let tp2=dir==='up'?price+20:price-20;
document.getElementById('tpsl').innerHTML=
`Entry: ${price.toFixed(2)}<br>
SL: ${sl.toFixed(2)}<br>
TP1: ${tp1.toFixed(2)} R:R 1:2<br>
TP2: ${tp2.toFixed(2)} R:R 1:4`;
}

function addHistory(sig,pct){
history.unshift({sig:sig,pct:pct.toFixed(0),time:new Date().toLocaleTimeString()});
if(history.length>20)history.pop();
let html=history.map(h=>`${h.time} ${h.sig} ${h.pct}%`).join('<br>');
document.getElementById('history').innerHTML=html;
let wins=history.filter(h=>h.sig==='ВВЕРХ'||h.sig==='ВНИЗ').length;
let wr=history.length>0?Math.round(wins/history.length*100):0;
document.getElementById('winrate').innerText=`Winrate: ${wr}%`;
}

function EMA(arr,p){let k=2/(p+1),ema=arr[0];for(let i=1;i<arr.length;i++)ema=arr[i]*k+ema*(1-k);return ema}
function RSI(arr,p){let g=0,l=0;for(let i=1;i<=p;i++){let ch=arr[i]-arr[i-1];if(ch>0)g+=ch;else l-=ch}let rs=g/p/(l/p||0.001);return 100-100/(1+rs)}
function beep(){try{let a=new AudioContext();let o=a.createOscillator();o.frequency.value=900;o.connect(a.destination);o.start();o.stop(a.currentTime+0.15);}catch(e){}}

if(key){scan();startTimer();}
document.getElementById('tf').onchange=()=>{scan();startTimer();};
</script></body></html>
